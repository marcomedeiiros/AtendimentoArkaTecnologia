services:
  postgres:
    image: postgres:16-alpine
    container_name: arka-chatbot-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: arka
      POSTGRES_PASSWORD: arka123
      POSTGRES_DB: arka_chatbot
    ports:
      - "5432:5432"
    volumes:
      - arka_pg_data:/var/lib/postgresql/data

volumes:
  arka_pg_data:
